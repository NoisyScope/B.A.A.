<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automation Hub</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 5rem; }
        .container { max-width: 600px; }
        .footer { padding: 1rem 0; text-align: center; margin-top: 2rem; border-top: 1px solid #e5e5e5; }
        .log-box {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 20px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
        <a class="navbar-brand" href="#">Automation Hub</a>
    </nav>

    <main role="main" class="container">
        <div class="jumbotron">
            <h1 class="display-4">Control Panel</h1>
            <p class="lead">{{ message }}</p>
            <hr class="my-4">
            <form id="controlForm">
                <div class="form-group">
                    <label for="urlInput">URL to Navigate</label>
                    <input type="url" class="form-control" id="urlInput" name="url" placeholder="Enter URL (e.g., https://www.google.com)" required>
                </div>
                <div class="form-group">
                    <label for="actionSelect">Action</label>
                    <select class="form-control" id="actionSelect" name="action">
                        <option value="navigate_and_screenshot">Navigate & Screenshot</option>
                        <option value="custom_action_1">Custom Action 1 (Placeholder)</option>
                        <option value="custom_action_2">Custom Action 2 (Placeholder)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-lg">Execute Action</button>
            </form>
        </div>

        <div id="statusMessages" class="mt-3">
            <!-- Status messages will be dynamically inserted here -->
        </div>

        <div class="log-box" id="appLogOutput">
            <p><em>Flask app log stream will appear here if configured...</em></p>
        </div>

    </main><!-- /.container -->

    <footer class="footer">
        <p>&copy; Automation Hub 2024</p>
    </footer>

    <!-- Bootstrap JS, Popper.js, and jQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <script>
        document.getElementById('controlForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent default form submission

            const url = document.getElementById('urlInput').value;
            const action = document.getElementById('actionSelect').value;
            const statusDiv = document.getElementById('statusMessages');

            statusDiv.innerHTML = '<div class="alert alert-info">Processing...</div>';

            fetch('/execute', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams({
                    'url': url,
                    'action': action
                })
            })
            .then(response => response.json())
            .then(data => {
                let alertClass = data.status === 'success' ? 'alert-success' : 'alert-danger';
                statusDiv.innerHTML = \`<div class="alert \${alertClass} alert-dismissible fade show" role="alert">
                                            <strong>\${data.status.toUpperCase()}:</strong> \${data.message}
                                            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                                <span aria-hidden="true">&times;</span>
                                            </button>
                                       </div>\`;
                // Attempt to refresh logs (optional, if log streaming is implemented)
                // fetchAppLogs();
            })
            .catch(error => {
                console.error('Error:', error);
                statusDiv.innerHTML = \`<div class="alert alert-danger alert-dismissible fade show" role="alert">
                                            <strong>Error:</strong> An unexpected error occurred. Check console for details.
                                            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                                <span aria-hidden="true">&times;</span>
                                            </button>
                                       </div>\`;
            });
        });

        // Optional: Function to fetch and display logs from flask_app.log
        // This would require another endpoint in Flask to serve log content
        // function fetchAppLogs() {
        //     fetch('/get_logs') // Assuming an endpoint /get_logs that returns log content
        //         .then(response => response.text())
        //         .then(text => {
        //             document.getElementById('appLogOutput').innerText = text;
        //         })
        //         .catch(error => console.error('Error fetching logs:', error));
        // }
        // Initial log fetch (if implementing)
        // fetchAppLogs();
        // Periodically refresh logs (if implementing)
        // setInterval(fetchAppLogs, 5000); // Refresh every 5 seconds
    </script>
</body>
</html>
